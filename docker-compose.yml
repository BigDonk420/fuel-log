services:
  fuellog:
    build: .
    container_name: fuellog
    ports:
      - "8137:8137"
    environment:
      # Shared access PIN for the app. Change this to something longer for
      # better protection once the app is public via Tailscale Funnel.
      APP_PIN: "666"
      # These read from the gitignored .env file (see .env.example) via Docker
      # Compose variable substitution — the .env is never copied into the image,
      # so this forwarding is the ONLY way the keys reach the container.
      USDA_API_KEY: ${USDA_API_KEY:-DEMO_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SUGGEST_MODEL: ${SUGGEST_MODEL:-claude-opus-4-8}
    volumes:
      - fuellog-data:/data
    restart: unless-stopped

volumes:
  fuellog-data:
