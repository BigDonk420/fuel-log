<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <!-- viewport-fit=cover lets the app paint into the iPhone notch/home-indicator
       area; the CSS then insets content with env(safe-area-inset-*). -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>FuelLog — runner nutrition</title>
  <meta name="description" content="Runner nutrition and fuelling tracker"/>
  <meta name="theme-color" content="#0f1418"/>

  <!-- Add to Home Screen: runs standalone (no Safari chrome) on iPhone -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-180.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FuelLog"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="app"></div>
  <!-- Quagga2: a decoder built specifically for 1D retail barcodes (UPC/EAN).
       html5-qrcode is a QR library and could not read a UPC-E on a curved can. -->
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
  <script src="model.js"></script>
  <script src="charts.js"></script>
  <script src="today.js"></script>
  <script src="food.js"></script>
  <script src="app.js"></script>
</body>
</html>
